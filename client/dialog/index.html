<!doctype html>
<html>
  <head>
    <title>SVG Zoom</title>
    <link id="favicon" href="/favicon.png" rel="icon" type="image/png" />
    <link href="/plugins/html/dialog/style.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/gh/dash14/svg-pan-zoom/dist/svg-pan-zoom.min.js"></script>
    <script type="module">
      const click = event => {
        event.stopPropagation()
        event.preventDefault()

        const keepLineup = event.shiftKey
        document.getSelection().removeAllRanges()

        console.log('click', event)

        const title =
          event.target.closest('a').dataset.title ||
          event.target.closest('g').group.querySelector('a')[0].dataset?.title ||
          null
        if (title) {
          const message = {
            action: 'doInternalLink',
            keepLineup,
            pageKey,
            context,
            title,
          }
          window.opener.postMessage(message)
        }
      }

      window.addEventListener('message', event => {
        const { svg, pageKey, context } = event.data
        if (!svg) return
        window.pageKey = pageKey
        window.context = context
        document.querySelector('.page').innerHTML = svg
        const targetBounds = {
          width: document.querySelector('.page').clientWidth,
          height: document.querySelector('.page').clientHeight,
        }
        const svgBounds = {
          width: document.querySelector('.page svg').clientWidth,
          height: document.querySelector('.page svg').clientHeight,
        }
        const svgElement = document.querySelector('svg')
        const panSVG = svgPanZoom(svgElement)
        if (targetBounds.width < svgBounds.width || targetBounds.height < svgBounds.height) {
          panSVG.resize()
        }
        panSVG.fit()
        panSVG.center()

        svgElement.addEventListener('click', click)
      })
    </script>
  </head>
  <body>
    <div class="page"></div>
  </body>
</html>
